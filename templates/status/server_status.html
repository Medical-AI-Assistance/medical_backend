<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Status</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #020617;
            padding: 30px 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
        }
        h1 {
            color: #22d3ee;
            margin-bottom: 10px;
        }
        p {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Medical Prediction Server is Running</h1>
        <p>Django backend is up and healthy.</p>
        <p><strong>Status:</strong> OK</p>
    </div>
</body>
</html>
